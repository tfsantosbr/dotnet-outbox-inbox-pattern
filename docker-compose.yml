services:
  postgres:
    image: postgres:16-alpine
    container_name: outbox-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordersdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordersdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - outbox-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: outbox-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - outbox-network
    restart: unless-stopped

  orders-api:
    build:
      context: .
      dockerfile: src/Orders/Orders.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres"
      ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "orders-api"
      FeatureManagement__OutboxStressTestSeed: "true"
      FeatureManagement__InboxDuplicateTestSeed: "false"
    ports:
      - "5176-5178:8080"
    networks:
      - outbox-network
      - observability
    restart: unless-stopped
    deploy:
      replicas: 3
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-consumer:
    build:
      context: .
      dockerfile: src/Notification/Notification.Consumer/Dockerfile
    container_name: outbox-notification-consumer
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres"
      ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "notification-consumer"
    networks:
      - outbox-network
      - observability
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-consumer:
    build:
      context: .
      dockerfile: src/Inventory/Inventory.Consumer/Dockerfile
    container_name: outbox-inventory-consumer
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres"
      ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "inventory-consumer"
      FeatureManagement__ProductSeed: "true"
      FeatureManagement__InboxDuplicateTestSeed: "false"
    networks:
      - outbox-network
      - observability
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

networks:
  outbox-network:
    name: outbox-network
  observability:
    external: true
    name: observability-grafana-stack_observability

volumes:
  postgres-data:
  rabbitmq-data:
