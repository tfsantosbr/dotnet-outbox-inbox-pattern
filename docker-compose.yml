services:
  postgres:
    image: postgres:16-alpine
    container_name: outbox-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordersdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordersdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: outbox-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management dashboard
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  orders-api:
    build:
      context: .
      dockerfile: src/Orders/Orders.API/Dockerfile
    container_name: outbox-orders-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres"
      ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "orders-api"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - default
      - observability
    restart: unless-stopped

  notification-consumer:
    build:
      context: .
      dockerfile: src/Notification/Notification.Consumer/Dockerfile
    container_name: outbox-notification-consumer
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres"
      ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "notification-consumer"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - default
      - observability
    restart: unless-stopped

  inventory-consumer:
    build:
      context: .
      dockerfile: src/Inventory/Inventory.Consumer/Dockerfile
    container_name: outbox-inventory-consumer
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__Database: "Host=postgres;Port=5432;Database=ordersdb;Username=postgres;Password=postgres"
      ConnectionStrings__RabbitMQ: "amqp://guest:guest@rabbitmq:5672/"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "inventory-consumer"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - default
      - observability
    restart: unless-stopped

networks:
  observability:
    external: true
    name: observability-grafana-stack_observability

volumes:
  postgres-data:
  rabbitmq-data:
